<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器错误 - 智慧图书馆管理系统</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <style>
        body {
            background: var(--bg-primary);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            padding: 2rem;
        }

        .error-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            opacity: 0.7;
        }

        .error-title {
            font-size: 3rem;
            color: var(--color-danger);
            margin: 0 0 0.5rem;
            font-weight: 700;
        }

        .error-message {
            font-size: 1.1rem;
            color: var(--color-text-secondary);
            margin: 0 0 2rem;
            max-width: 500px;
            line-height: 1.6;
        }

        .error-details {
            background: rgba(194, 112, 112, 0.05);
            border: 1px solid rgba(194, 112, 112, 0.2);
            border-radius: var(--radius-sm);
            padding: 0.75rem 1rem;
            margin: 0.5rem 0;
            max-width: 700px;
            text-align: left;
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--color-danger);
            overflow-x: auto;
            display: none;
        }

        .error-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 0.6rem 1.25rem;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-family: var(--font-family);
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--color-text);
            border: 1px solid var(--color-border);
        }

        .btn-danger {
            background: var(--color-danger);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(155, 142, 196, 0.25);
        }

        .btn-secondary:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .btn-danger:hover {
            background: #B06060;
        }

        .toggle-details {
            color: var(--color-primary);
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.85rem;
            margin-top: 0.75rem;
            display: inline-block;
        }

        @media (max-width: 768px) {
            .error-title { font-size: 2.5rem; }
            .error-icon { font-size: 4rem; }
        }
    </style>
</head>
<body>
    <main class="error-container">
        <div class="error-icon">💥</div>
        <h1 class="error-title">500</h1>
        <p class="error-message">
            抱歉，服务器内部发生错误。<br>
            我们的技术团队已收到通知，正在紧急处理中。<br>
            请稍后重试，或联系系统管理员。
        </p>

        <div id="errorDetails" class="error-details"></div>
        <a href="javascript:void(0)" class="toggle-details" onclick="toggleErrorDetails()">显示错误详情</a>

        <div class="error-actions">
            <a href="/" class="btn btn-primary">返回首页</a>
            <a href="javascript:history.back()" class="btn btn-secondary">返回上一页</a>
            <a href="mailto:admin@library.com" class="btn btn-danger">联系管理员</a>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const errorDetails = document.getElementById('errorDetails');
            const urlParams = new URLSearchParams(window.location.search);
            const errorParam = urlParams.get('error');

            if (errorParam) {
                errorDetails.textContent = decodeURIComponent(errorParam);
            } else {
                errorDetails.textContent = '错误时间: ' + new Date().toLocaleString() + '\n';
                errorDetails.textContent += '错误类型: 服务器内部错误\n';
                errorDetails.textContent += '建议操作: 请刷新页面或稍后重试\n';
                errorDetails.textContent += '如果问题持续存在，请联系系统管理员。';
            }
        });

        function toggleErrorDetails() {
            const details = document.getElementById('errorDetails');
            const toggle = document.querySelector('.toggle-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                toggle.textContent = '显示错误详情';
            } else {
                details.style.display = 'block';
                toggle.textContent = '隐藏错误详情';
            }
        }
    </script>
</body>
</html>
