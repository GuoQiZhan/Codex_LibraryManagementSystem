<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运营仪表盘 - 智慧图书馆管理系统</title>
    <link rel="stylesheet" href="/static/css/base.css?v=2">
    <link rel="stylesheet" href="/static/css/dashboard.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        .dashboard-header {
            background: var(--gradient-header);
            padding: 1.5rem 2rem;
            border-radius: var(--radius-xl);
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border);
            position: relative;
            overflow: hidden;
        }

        .dashboard-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .dashboard-title h1 {
            font-size: 1.6rem;
            color: var(--color-text);
            margin: 0;
            font-weight: 700;
        }

        .dashboard-title p {
            color: var(--color-text-secondary);
            margin: 0.25rem 0 0;
            font-size: 0.9rem;
        }

        .period-filter {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
        }

        .period-filter label {
            font-weight: 500;
            color: var(--color-text-secondary);
            font-size: 0.85rem;
        }

        .period-filter select {
            padding: 0.4rem 0.75rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            background: white;
            color: var(--color-text);
            font-size: 0.85rem;
            transition: border-color 0.2s ease;
            font-family: var(--font-family);
            cursor: pointer;
        }

        .period-filter select:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        @media (max-width: 768px) {
            .dashboard-header {
                padding: 1rem 1.25rem;
            }

            .header-top {
                flex-direction: column;
                align-items: flex-start;
            }

            .dashboard-title h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- 左侧折叠导航 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-logo-icon">📚</span>
                <span class="sidebar-title">智慧图书馆</span>
                <button class="sidebar-toggle" id="sidebarToggle" title="折叠导航">◀</button>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-title">概览</div>
                <a href="/" class="sidebar-nav-item">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-label">首页</span>
                </a>
                <a href="/dashboard" class="sidebar-nav-item active">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">仪表盘</span>
                </a>

                <div class="nav-section-title">业务管理</div>
                <a href="/reader" class="sidebar-nav-item">
                    <span class="nav-icon">👥</span>
                    <span class="nav-label">读者管理</span>
                </a>
                <a href="/book" class="sidebar-nav-item">
                    <span class="nav-icon">📖</span>
                    <span class="nav-label">图书管理</span>
                </a>
                <a href="/borrow" class="sidebar-nav-item">
                    <span class="nav-icon">🔄</span>
                    <span class="nav-label">借阅服务</span>
                </a>

                <div class="nav-section-title">数据</div>
                <a href="/stats" class="sidebar-nav-item">
                    <span class="nav-icon">📈</span>
                    <span class="nav-label">数据分析</span>
                </a>
                <a href="/admin" class="sidebar-nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-label">系统管理</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-nav-item" style="cursor: default; color: var(--color-text-muted); font-size: 0.8rem;">
                    <span class="nav-icon">⏱</span>
                    <span class="nav-label" id="sidebarTime">--</span>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content" id="mainContent">
            <!-- 顶部标题栏 -->
            <div class="top-bar">
                <div class="page-title-area">
                    <h1>运营指挥中心</h1>
                    <p>实时监控图书馆运营数据，洞察读者行为趋势</p>
                </div>
                <div class="top-bar-actions">
                    <span style="font-size:0.8rem;color:var(--color-text-muted);" id="headerTime">--</span>
                    <button class="btn btn-secondary" onclick="loadDashboardData()" style="font-size:0.85rem;">
                        🔄 刷新
                    </button>
                </div>
            </div>

            <!-- 核心指标卡片 -->
            <section class="stats-cards fade-in-up">
                <div class="stat-card">
                    <div class="stat-header">
                        <div>
                            <p class="stat-label">今日借阅</p>
                            <div class="stat-value" id="todayBorrows">0</div>
                        </div>
                        <div class="stat-icon">📖</div>
                    </div>
                    <div class="stat-change positive" id="borrowChange">+0%</div>
                </div>

                <div class="stat-card">
                    <div class="stat-header">
                        <div>
                            <p class="stat-label">在线读者</p>
                            <div class="stat-value" id="activeReaders">0</div>
                        </div>
                        <div class="stat-icon">👥</div>
                    </div>
                    <div class="stat-change positive" id="readerChange">+0%</div>
                </div>

                <div class="stat-card">
                    <div class="stat-header">
                        <div>
                            <p class="stat-label">在借图书</p>
                            <div class="stat-value" id="borrowedBooks">0</div>
                        </div>
                        <div class="stat-icon">📚</div>
                    </div>
                    <div class="stat-label" id="availableBooks" style="color:var(--color-text-muted);font-size:0.8rem;">可用: 0 本</div>
                </div>

                <div class="stat-card">
                    <div class="stat-header">
                        <div>
                            <p class="stat-label">逾期图书</p>
                            <div class="stat-value" id="overdueBooks">0</div>
                        </div>
                        <div class="stat-icon">⏰</div>
                    </div>
                    <div class="stat-change negative" id="overdueChange">+0%</div>
                </div>
            </section>

            <!-- 图表区域 + 右侧筛选面板 -->
            <div class="content-with-sidebar">
                <div class="content-main">
                    <!-- 图表网格 -->
                    <section class="charts-grid fade-in-up">
                        <div class="chart-container">
                            <div class="chart-header">
                                <h2 class="chart-title">借阅趋势分析</h2>
                                <div class="chart-controls">
                                    <button class="active" data-chart="borrowTrend">趋势</button>
                                    <button data-chart="categoryTrend">分类</button>
                                </div>
                            </div>
                            <div class="chart" id="borrowTrendChart"></div>
                        </div>

                        <div class="chart-container">
                            <div class="chart-header">
                                <h2 class="chart-title">图书类别分布</h2>
                                <div class="chart-controls">
                                    <button class="active" data-chart="categoryPie">饼图</button>
                                    <button data-chart="categoryBar">柱状图</button>
                                </div>
                            </div>
                            <div class="chart" id="categoryChart"></div>
                        </div>

                        <div class="chart-container full-width-chart">
                            <div class="chart-header">
                                <h2 class="chart-title">读者活跃度分析</h2>
                                <div class="chart-controls">
                                    <button class="active" data-chart="hourly">24小时分布</button>
                                    <button data-chart="credit">信用分布</button>
                                    <button data-chart="activity">借阅分组</button>
                                </div>
                            </div>
                            <div class="chart" id="activityChart"></div>
                        </div>
                    </section>

                    <!-- 近期活动 -->
                    <section class="recent-activities fade-in-up">
                        <div class="activities-header">
                            <h2>近期活动</h2>
                            <button class="btn btn-secondary" style="font-size:0.8rem;padding:0.3rem 0.75rem;">查看更多</button>
                        </div>
                        <div class="activities-list" id="activitiesList">
                            <div class="activity-item">
                                <div class="activity-icon">📖</div>
                                <div class="activity-content">
                                    <h3 class="activity-title">系统初始化</h3>
                                    <p class="activity-desc">图书馆管理系统已启动</p>
                                    <p class="activity-time">刚刚</p>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/dashboard.js?v=2"></script>
    <script>
        // 侧边栏折叠切换
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            setTimeout(() => {
                if (window.borrowTrendChart) window.borrowTrendChart.resize();
                if (window.categoryChart) window.categoryChart.resize();
                if (window.activityChart) window.activityChart.resize();
            }, 350);
        });

        // 实时时钟
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('headerTime').textContent = time;
            document.getElementById('sidebarTime').textContent = time;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // 诊断信息
        console.log('=== 仪表盘加载诊断 ===');
        console.log('ECharts可用:', typeof echarts !== 'undefined');
        console.log('页面路径:', window.location.pathname);
        console.log('页面加载时间:', new Date().toLocaleString());
    </script>
</body>
</html>
