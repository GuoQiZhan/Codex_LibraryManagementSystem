<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智慧图书馆管理系统</title>
    <link rel="stylesheet" href="/static/css/base.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary-purple: #9B8EC4;
        --secondary-purple: #7E69AB;
        --light-purple: #F0EFF5;
        --accent-purple: #B8A6D9;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
        line-height: 1.6;
        color: #333640;
        background-color: #F5F7FA;
      }

      .nav-header {
        background: white;
        padding: 1rem 0;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 1px 3px rgba(155, 142, 196, 0.1);
      }

      .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        font-size: 1.4rem;
        font-weight: 600;
        color: #333640;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .logo-icon {
        color: var(--primary-purple);
        font-size: 1.6rem;
      }

      .main-nav {
        display: flex;
        gap: 2rem;
      }

      .nav-link {
        color: #6B7084;
        text-decoration: none;
        font-weight: 500;
        font-size: 0.95rem;
        transition: color 0.2s ease;
      }

      .nav-link:hover, .nav-link.active {
        color: var(--primary-purple);
      }

      .nav-link.active {
        position: relative;
      }

      .nav-link.active::after {
        content: '';
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 100%;
        height: 2px;
        background: var(--primary-purple);
        border-radius: 1px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2rem;
      }

      .hero {
        padding: 6rem 0;
        text-align: center;
        background: linear-gradient(135deg, white 0%, var(--light-purple) 100%);
        margin: 2rem 0;
        border-radius: 12px;
        position: relative;
        overflow: hidden;
      }

      .hero::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(circle at 20% 80%, var(--accent-purple) 0%, transparent 50%);
        opacity: 0.1;
        pointer-events: none;
      }

      .hero h1 {
        font-size: 2.5rem;
        font-weight: 700;
        color: #333640;
        margin-bottom: 1.5rem;
        position: relative;
        z-index: 1;
      }

      .hero p {
        font-size: 1.1rem;
        color: #6B7084;
        max-width: 600px;
        margin: 0 auto 2.5rem;
        line-height: 1.6;
        position: relative;
        z-index: 1;
      }

      .cta-buttons {
        display: flex;
        justify-content: center;
        gap: 1rem;
        flex-wrap: wrap;
        position: relative;
        z-index: 1;
      }

      .cta-button {
        display: inline-block;
        padding: 0.875rem 2rem;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        font-size: 1rem;
        transition: all 0.2s ease;
        border: none;
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }

      .cta-primary {
        background: linear-gradient(135deg, var(--primary-purple) 0%, var(--secondary-purple) 100%);
        color: white;
      }

      .cta-secondary {
        background-color: white;
        color: var(--primary-purple);
        border: 1px solid var(--light-purple);
      }

      .cta-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(155, 142, 196, 0.2);
      }

      .cta-primary:hover {
        box-shadow: 0 6px 20px rgba(155, 142, 196, 0.3);
      }

      .section-title {
        font-size: 1.8rem;
        font-weight: 600;
        color: #333640;
        text-align: center;
        margin-bottom: 3rem;
      }

      .quick-access {
        padding: 4rem 0;
        background: linear-gradient(135deg, white 0%, var(--light-purple) 100%);
        margin: 4rem 0;
        border-radius: 12px;
        position: relative;
        overflow: hidden;
      }

      .quick-access::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(circle at 80% 20%, var(--accent-purple) 0%, transparent 50%);
        opacity: 0.1;
        pointer-events: none;
      }

      .access-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1.5rem;
        position: relative;
        z-index: 1;
      }

      .access-card {
        text-align: center;
        padding: 1.5rem;
        border: 1px solid #E2E5EB;
        border-radius: 8px;
        transition: all 0.2s ease;
        background: white;
        position: relative;
        overflow: hidden;
      }

      .access-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--primary-purple), var(--accent-purple));
        transform: scaleX(0);
        transition: transform 0.2s ease;
      }

      .access-card:hover {
        border-color: var(--primary-purple);
        box-shadow: 0 4px 12px rgba(155, 142, 196, 0.1);
        transform: translateY(-4px);
      }

      .access-card:hover::before {
        transform: scaleX(1);
      }

      .access-icon {
        font-size: 2rem;
        margin-bottom: 1rem;
        color: var(--primary-purple);
        transition: transform 0.2s ease;
      }

      .access-card:hover .access-icon {
        transform: scale(1.1);
      }

      .access-card a {
        text-decoration: none;
        color: #333640;
        font-weight: 500;
        display: block;
        transition: color 0.2s ease;
      }

      .access-card:hover a {
        color: var(--primary-purple);
      }

      @media (max-width: 768px) {
        .nav-container {
          padding: 0 1rem;
        }

        .main-nav {
          display: none;
        }

        .container {
          padding: 0 1rem;
        }

        .hero {
          padding: 4rem 0;
        }

        .hero h1 {
          font-size: 2rem;
        }

        .cta-buttons {
          flex-direction: column;
          align-items: center;
        }

        .cta-button {
          width: 100%;
          max-width: 300px;
          text-align: center;
        }

        .features-grid,
        .access-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="nav-header">
      <div class="nav-container">
        <a href="/" class="logo">
          <span class="logo-icon">📚</span>
          <span>智慧图书馆</span>
        </a>
        <nav class="main-nav">
          <a href="/" class="nav-link active">首页</a>
          <a href="/dashboard" class="nav-link">仪表盘</a>
          <a href="/reader" class="nav-link">读者</a>
          <a href="/book" class="nav-link">图书</a>
          <a href="/borrow" class="nav-link">借阅</a>
          <a href="/stats" class="nav-link">数据</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h1>智慧图书馆管理系统</h1>
        <p>简洁高效的图书馆管理解决方案，帮助您轻松管理图书、读者和借阅流程，提升图书馆运营效率</p>
        <div class="cta-buttons">
          <a href="/dashboard" class="cta-button cta-primary">进入仪表盘</a>
          <a href="/reader" class="cta-button cta-secondary">开始管理</a>
        </div>
      </section>

      <section class="quick-access">
        <h2 class="section-title">快速访问</h2>
        <div class="access-grid">
          <div class="access-card">
            <div class="access-icon">📊</div>
            <a href="/stats">数据分析</a>
          </div>
          <div class="access-card">
            <div class="access-icon">👤</div>
            <a href="/reader">读者管理</a>
          </div>
          <div class="access-card">
            <div class="access-icon">📚</div>
            <a href="/book">图书管理</a>
          </div>
          <div class="access-card">
            <div class="access-icon">📅</div>
            <a href="/borrow">借阅服务</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
