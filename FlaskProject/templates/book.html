<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书管理 - 智慧图书馆管理系统</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <style>
        .page-header {
            background: var(--gradient-header);
            padding: 1.5rem 2rem;
            border-radius: var(--radius-xl);
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border);
            position: relative;
            overflow: hidden;
        }

        .page-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
        }

        .page-title h1 {
            font-size: 1.6rem;
            color: var(--color-text);
            margin: 0 0 0.25rem;
            font-weight: 700;
        }

        .page-title p {
            color: var(--color-text-secondary);
            margin: 0;
            font-size: 0.9rem;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--color-card-bg);
            border-radius: var(--radius-lg);
            padding: 1.25rem 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border);
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--color-primary);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--color-text);
            margin: 0.25rem 0;
        }

        .stat-label {
            color: var(--color-text-secondary);
            font-size: 0.85rem;
            margin: 0;
        }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding: 1rem 1.5rem;
            background: var(--color-card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border);
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-filter-container {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .search-input {
            padding: 0.5rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            width: 260px;
            font-size: 0.9rem;
            font-family: var(--font-family);
            color: var(--color-text);
            transition: all 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(122, 139, 110, 0.1);
        }

        .filter-select {
            padding: 0.5rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            background: white;
            color: var(--color-text);
            font-size: 0.85rem;
            font-family: var(--font-family);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .view-toggle {
            display: flex;
            gap: 0.35rem;
            align-items: center;
        }

        .view-btn {
            padding: 0.4rem 0.75rem;
            border: 1px solid var(--color-border);
            background: white;
            border-radius: var(--radius-sm);
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 0.8rem;
            font-family: var(--font-family);
        }

        .view-btn.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .view-btn:hover:not(.active) {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
            font-family: var(--font-family);
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--color-text);
            border: 1px solid var(--color-border);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
            border: none;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(122, 139, 110, 0.25);
        }

        .btn-secondary:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .books-container {
            background: var(--color-card-bg);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border);
            margin-bottom: 1.5rem;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
            padding: 1.25rem;
        }

        .book-card {
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border);
            transition: all 0.3s ease;
        }

        .book-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-3px);
        }

        .book-cover {
            height: 180px;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
            opacity: 0.9;
        }

        .book-info {
            padding: 1.25rem;
        }

        .book-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--color-text);
            margin: 0 0 0.35rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-author {
            color: var(--color-text-secondary);
            font-size: 0.85rem;
            margin: 0 0 0.35rem;
        }

        .book-meta {
            display: flex;
            justify-content: space-between;
            margin: 0.75rem 0;
            padding-top: 0.75rem;
            border-top: 1px solid var(--color-border);
        }

        .meta-item {
            text-align: center;
        }

        .meta-label {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            margin-bottom: 0.2rem;
        }

        .meta-value {
            font-weight: 600;
            color: var(--color-text);
            font-size: 0.85rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-available {
            background: rgba(107, 158, 122, 0.1);
            color: var(--color-success);
        }

        .status-borrowed {
            background: rgba(196, 122, 122, 0.1);
            color: var(--color-danger);
        }

        .status-reserved {
            background: rgba(196, 163, 90, 0.1);
            color: var(--color-warning);
        }

        .book-actions {
            display: flex;
            gap: 0.35rem;
            margin-top: 0.75rem;
        }

        .action-btn {
            flex: 1;
            padding: 0.4rem 0.65rem;
            border: 1px solid var(--color-border);
            background: white;
            border-radius: var(--radius-sm);
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 0.8rem;
            text-align: center;
            font-family: var(--font-family);
        }

        .action-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .action-btn.primary {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .action-btn.primary:hover {
            background: var(--color-accent);
        }

        .books-list .book-card {
            display: flex;
            margin-bottom: 0.75rem;
        }

        .books-list .book-cover {
            width: 120px;
            height: 120px;
            flex-shrink: 0;
        }

        .books-list .book-info {
            flex: 1;
        }

        .books-list .book-meta {
            display: flex;
            gap: 1.5rem;
            border-top: none;
            margin: 0.35rem 0;
            padding-top: 0;
        }

        .books-list .book-actions {
            justify-content: flex-start;
        }

        .books-table {
            display: none;
            width: 100%;
            overflow-x: auto;
        }

        .table-header {
            display: grid;
            grid-template-columns: 1fr 3fr 2fr 2fr 1fr 1fr 2fr;
            padding: 0.75rem 1.25rem;
            background: var(--bg-secondary);
            font-weight: 600;
            color: var(--color-text);
            border-bottom: 2px solid var(--color-primary);
            font-size: 0.85rem;
        }

        .table-row {
            display: grid;
            grid-template-columns: 1fr 3fr 2fr 2fr 1fr 1fr 2fr;
            padding: 0.75rem 1.25rem;
            align-items: center;
            border-bottom: 1px solid var(--color-border);
            transition: background 0.15s ease;
            font-size: 0.85rem;
        }

        .table-row:hover {
            background: var(--bg-secondary);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .pagination button {
            padding: 0.4rem 0.9rem;
            border: 1px solid var(--color-border);
            background: white;
            border-radius: var(--radius-sm);
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: var(--font-family);
            font-size: 0.85rem;
        }

        .pagination button:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .pagination button.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: var(--radius-lg);
            padding: 1.5rem 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            color: var(--color-text);
            margin-top: 0;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--color-text-secondary);
            padding: 0.25rem;
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--color-text);
        }

        .book-detail-modal {
            max-width: 600px;
        }

        .modal-body {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .book-detail-header {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--color-border);
        }

        .book-cover-large {
            width: 120px;
            height: 160px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            flex-shrink: 0;
        }

        .book-main-info h3 {
            font-size: 1.3rem;
            margin: 0 0 0.5rem;
            color: var(--color-text);
        }

        .book-main-info .author {
            color: var(--color-text-secondary);
            margin-bottom: 0.5rem;
        }

        .book-status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-available {
            background: #d4edda;
            color: #155724;
        }

        .status-borrowed {
            background: #fff3cd;
            color: #856404;
        }

        .status-unavailable {
            background: #f8d7da;
            color: #721c24;
        }

        .book-detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .detail-item {
            background: var(--color-bg);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
        }

        .detail-item.full-width {
            grid-column: span 2;
        }

        .detail-label {
            font-size: 0.8rem;
            color: var(--color-text-secondary);
            margin-bottom: 0.25rem;
        }

        .detail-value {
            font-size: 1rem;
            color: var(--color-text);
            font-weight: 500;
        }

        .book-description {
            background: var(--color-bg);
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-top: 1rem;
        }

        .book-description h4 {
            margin: 0 0 0.5rem;
            font-size: 0.95rem;
        }

        .book-description p {
            margin: 0;
            color: var(--color-text-secondary);
            line-height: 1.6;
        }

        .book-detail-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--color-border);
        }

        .book-detail-actions .btn {
            flex: 1;
        }

        @media (max-width: 480px) {
            .book-detail-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .book-detail-grid {
                grid-template-columns: 1fr;
            }

            .detail-item.full-width {
                grid-column: span 1;
            }
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-family: var(--font-family);
            color: var(--color-text);
            transition: all 0.2s ease;
        }

        .modal-content input:focus,
        .modal-content select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(122, 139, 110, 0.1);
        }

        @media (max-width: 768px) {
            .actions-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .search-filter-container {
                flex-direction: column;
                align-items: stretch;
            }

            .search-input {
                width: 100%;
            }

            .books-list .book-card {
                flex-direction: column;
            }

            .books-list .book-cover {
                width: 100%;
                height: 160px;
            }

            .stats-cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .books-grid {
                grid-template-columns: 1fr;
            }

            .stats-cards {
                grid-template-columns: 1fr;
            }

            .book-meta {
                flex-direction: column;
                gap: 0.35rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- 左侧折叠导航 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-logo-icon">📚</span>
                <span class="sidebar-title">智慧图书馆</span>
                <button class="sidebar-toggle" id="sidebarToggle" title="折叠导航">◀</button>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-title">概览</div>
                <a href="/" class="sidebar-nav-item">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-label">首页</span>
                </a>
                <a href="/dashboard" class="sidebar-nav-item">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">仪表盘</span>
                </a>

                <div class="nav-section-title">业务管理</div>
                <a href="/reader" class="sidebar-nav-item">
                    <span class="nav-icon">👥</span>
                    <span class="nav-label">读者管理</span>
                </a>
                <a href="/book" class="sidebar-nav-item active">
                    <span class="nav-icon">📖</span>
                    <span class="nav-label">图书管理</span>
                </a>
                <a href="/borrow" class="sidebar-nav-item">
                    <span class="nav-icon">🔄</span>
                    <span class="nav-label">借阅服务</span>
                </a>

                <div class="nav-section-title">数据</div>
                <a href="/stats" class="sidebar-nav-item">
                    <span class="nav-icon">📈</span>
                    <span class="nav-label">数据分析</span>
                </a>
                <a href="/admin" class="sidebar-nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-label">系统管理</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-nav-item" style="cursor: default; color: var(--color-text-muted); font-size: 0.8rem;">
                    <span class="nav-icon">⏱</span>
                    <span class="nav-label" id="sidebarTime">--</span>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title-area">
                    <h1>图书管理</h1>
                    <p>管理图书馆藏书，监控库存状态，维护图书信息</p>
                </div>
                <div class="top-bar-actions">
                    <button class="btn btn-primary" onclick="openNewBookModal()">
                        + 添加新书
                    </button>
                </div>
            </div>

            <section class="stats-cards fade-in-up">
                <div class="stat-card">
                    <div class="stat-icon">📚</div>
                    <div class="stat-value" id="totalBooks">0</div>
                    <p class="stat-label">总藏书量</p>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-value" id="availableBooks">0</div>
                    <p class="stat-label">可借图书</p>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">📖</div>
                    <div class="stat-value" id="borrowedBooks">0</div>
                    <p class="stat-label">在借图书</p>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">⭐</div>
                    <div class="stat-value" id="newBooks">0</div>
                    <p class="stat-label">本月新增</p>
                </div>
            </section>

            <section class="actions-bar fade-in-up">
                <div class="search-filter-container">
                    <div class="search-box">
                        <input type="text" class="search-input" placeholder="搜索图书标题、作者、ISBN...">
                        <button class="btn btn-primary" onclick="searchBooks()">搜索</button>
                    </div>

                    <select class="filter-select" id="categoryFilter">
                        <option value="">所有类别</option>
                        <option value="computer">计算机</option>
                        <option value="literature">文学</option>
                        <option value="economy">经济管理</option>
                        <option value="engineering">工程技术</option>
                        <option value="science">自然科学</option>
                        <option value="social">社会科学</option>
                    </select>

                    <select class="filter-select" id="statusFilter">
                        <option value="">所有状态</option>
                        <option value="available">可借阅</option>
                        <option value="borrowed">已借出</option>
                        <option value="reserved">已预约</option>
                    </select>

                    <div class="view-toggle">
                        <button class="view-btn active" data-view="grid" onclick="changeView('grid')">
                            🧱 网格
                        </button>
                        <button class="view-btn" data-view="list" onclick="changeView('list')">
                            📋 列表
                        </button>
                    </div>
                </div>
            </section>

            <section class="books-container fade-in-up">
                <div id="booksGrid" class="books-grid">
                    <div class="book-card">
                        <div class="book-cover">📚</div>
                        <div class="book-info">
                            <h3 class="book-title">Python编程从入门到实践</h3>
                            <p class="book-author">作者: Eric Matthes</p>
                            <div class="book-meta">
                                <div class="meta-item">
                                    <div class="meta-label">ISBN</div>
                                    <div class="meta-value">9787115428028</div>
                                </div>
                                <div class="meta-item">
                                    <div class="meta-label">类别</div>
                                    <div class="meta-value">计算机</div>
                                </div>
                                <div class="meta-item">
                                    <div class="meta-label">库存</div>
                                    <div class="meta-value">5/8</div>
                                </div>
                            </div>
                            <div class="status-badge status-available">可借阅</div>
                            <div class="book-actions">
                                <button class="action-btn primary" onclick="borrowBook('B20230001')">借阅</button>
                                <button class="action-btn" onclick="viewBook('B20230001')">详情</button>
                                <button class="action-btn" onclick="editBook('B20230001')">编辑</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="booksList" class="books-list" style="display: none;"></div>

                <div id="booksTable" class="books-table">
                    <div class="table-header">
                        <div>图书ID</div>
                        <div>书名</div>
                        <div>作者</div>
                        <div>ISBN</div>
                        <div>类别</div>
                        <div>库存</div>
                        <div>操作</div>
                    </div>
                    <div id="booksTableBody"></div>
                </div>
            </section>

            <div class="pagination fade-in-up">
                <button onclick="changePage(-1)" disabled id="prevPage">上一页</button>
                <div>
                    <span id="currentPage">1</span> / <span id="totalPages">1</span>
                </div>
                <button onclick="changePage(1)" id="nextPage">下一页</button>
            </div>

            <!-- 添加/编辑图书模态框 -->
            <div id="newBookModal" class="modal-overlay">
                <div class="modal-content">
                    <h2>添加新书</h2>
                    <form id="newBookForm">
                        <div style="display: grid; gap: 1rem;">
                            <input type="text" name="isbn" placeholder="ISBN (不可修改)" required>
                            <input type="text" name="title" placeholder="图书标题" required>
                            <input type="text" name="author" placeholder="作者" required>
                            <input type="text" name="publisher" placeholder="出版社">
                            <input type="text" name="publish_year" placeholder="出版年份">
                            <select name="category_name">
                                <option value="">选择类别</option>
                                <option value="计算机">计算机</option>
                                <option value="文学">文学</option>
                                <option value="经济管理">经济管理</option>
                                <option value="历史">历史</option>
                                <option value="哲学">哲学</option>
                                <option value="艺术">艺术</option>
                                <option value="生活">生活</option>
                                <option value="科技">科技</option>
                            </select>
                            <input type="number" name="total_stock" placeholder="总库存" min="0" value="1">
                            <input type="number" name="available_stock" placeholder="可用库存" min="0" value="1">
                            <input type="text" name="price" placeholder="价格">
                            <input type="number" name="hot_score" placeholder="热门指数" min="0" step="0.1" value="0">
                            <textarea name="description" placeholder="内容简介" rows="3"></textarea>
                        </div>
                        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                            <button type="button" class="btn btn-secondary" style="flex: 1;" onclick="closeNewBookModal()">取消</button>
                            <button type="submit" class="btn btn-primary" style="flex: 1;">保存</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 图书详情模态框 -->
            <div id="bookDetailModal" class="modal-overlay" style="display: none; opacity: 0;">
                <div class="modal-content book-detail-modal">
                    <div class="modal-header">
                        <h2>图书详情</h2>
                        <button class="modal-close" onclick="closeBookDetailModal()">&times;</button>
                    </div>
                    <div id="bookDetailContent" class="modal-body">
                        <div class="loading-container">
                            <div class="loading-spinner"></div>
                            <p>正在加载...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/book.js"></script>
    <script>
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        });

        document.getElementById('bookDetailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeBookDetailModal();
            }
        });

        function updateClock() {
            const now = new Date();
            document.getElementById('sidebarTime').textContent = now.toLocaleString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
