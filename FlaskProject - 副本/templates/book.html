<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书管理 - 智慧图书馆管理系统</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <style>
        /* 图书管理页面特定样式 */
        .page-header {
            background: linear-gradient(135deg, #FFFFFF 0%, #F8F8FF 100%);
            padding: 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(230, 230, 250, 0.2);
        }

        .page-title h1 {
            font-size: 2.2rem;
            color: #333;
            margin: 0 0 0.5rem;
            background: linear-gradient(135deg, #D8BFD8 0%, #E6E6FA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-title p {
            color: #666;
            margin: 0;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(230, 230, 250, 0.2);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #D8BFD8;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
            margin: 0.5rem 0;
        }

        .stat-label {
            color: #666;
            font-size: 0.95rem;
            margin: 0;
        }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 10px rgba(230, 230, 250, 0.1);
        }

        .search-filter-container {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .search-input {
            padding: 0.8rem 1.5rem;
            border: 2px solid #E6E6FA;
            border-radius: 8px;
            width: 300px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #D8BFD8;
            box-shadow: 0 0 0 3px rgba(216, 191, 216, 0.1);
        }

        .filter-select {
            padding: 0.8rem 1.5rem;
            border: 2px solid #E6E6FA;
            border-radius: 8px;
            background: white;
            color: #333;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .filter-select:focus {
            outline: none;
            border-color: #D8BFD8;
        }

        .view-toggle {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .view-btn {
            padding: 0.6rem 1rem;
            border: 2px solid #E6E6FA;
            background: white;
            border-radius: 6px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .view-btn.active {
            background: #D8BFD8;
            border-color: #D8BFD8;
            color: white;
        }

        .view-btn:hover {
            border-color: #D8BFD8;
            color: #D8BFD8;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #D8BFD8 0%, #E6E6FA 100%);
            color: white;
        }

        .btn-secondary {
            background: #F8F8FF;
            color: #666;
            border: 2px solid #E6E6FA;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(216, 191, 216, 0.3);
        }

        .btn-secondary:hover {
            border-color: #D8BFD8;
            color: #D8BFD8;
        }

        .books-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(230, 230, 250, 0.2);
            margin-bottom: 2rem;
        }

        /* 网格视图 */
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            padding: 1.5rem;
        }

        .book-card {
            background: #F8F8FF;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 10px rgba(230, 230, 250, 0.2);
            transition: all 0.3s ease;
            position: relative;
        }

        .book-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(216, 191, 216, 0.3);
        }

        .book-cover {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #E6E6FA 0%, #D8BFD8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
        }

        .book-info {
            padding: 1.5rem;
        }

        .book-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin: 0 0 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-author {
            color: #666;
            font-size: 0.95rem;
            margin: 0 0 0.5rem;
        }

        .book-meta {
            display: flex;
            justify-content: space-between;
            margin: 1rem 0;
            padding-top: 1rem;
            border-top: 1px solid #E6E6FA;
        }

        .meta-item {
            text-align: center;
        }

        .meta-label {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 0.3rem;
        }

        .meta-value {
            font-weight: 600;
            color: #333;
        }

        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-available {
            background: rgba(72, 187, 120, 0.1);
            color: #48BB78;
        }

        .status-borrowed {
            background: rgba(245, 101, 101, 0.1);
            color: #F56565;
        }

        .status-reserved {
            background: rgba(245, 158, 11, 0.1);
            color: #ED8936;
        }

        .book-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .action-btn {
            flex: 1;
            padding: 0.6rem 1rem;
            border: 1px solid #E6E6FA;
            background: white;
            border-radius: 6px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            text-align: center;
        }

        .action-btn:hover {
            border-color: #D8BFD8;
            color: #D8BFD8;
        }

        .action-btn.primary {
            background: #D8BFD8;
            border-color: #D8BFD8;
            color: white;
        }

        .action-btn.primary:hover {
            background: #C8AFC8;
        }

        /* 列表视图 */
        .books-list .book-card {
            display: flex;
            margin-bottom: 1rem;
        }

        .books-list .book-cover {
            width: 150px;
            height: 150px;
            flex-shrink: 0;
        }

        .books-list .book-info {
            flex: 1;
        }

        .books-list .book-meta {
            display: flex;
            gap: 2rem;
            border-top: none;
            margin: 0.5rem 0;
            padding-top: 0;
        }

        .books-list .book-actions {
            justify-content: flex-start;
        }

        /* 表格视图（备用） */
        .books-table {
            display: none;
            width: 100%;
        }

        .table-header {
            display: grid;
            grid-template-columns: 1fr 3fr 2fr 2fr 1fr 1fr 2fr;
            padding: 1rem 1.5rem;
            background: #F8F8FF;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #E6E6FA;
        }

        .table-row {
            display: grid;
            grid-template-columns: 1fr 3fr 2fr 2fr 1fr 1fr 2fr;
            padding: 1rem 1.5rem;
            align-items: center;
            border-bottom: 1px solid #F0F0F0;
            transition: background 0.2s ease;
        }

        .table-row:hover {
            background: #F8F8FF;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .pagination button {
            padding: 0.6rem 1.2rem;
            border: 1px solid #E6E6FA;
            background: white;
            border-radius: 6px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .pagination button:hover {
            border-color: #D8BFD8;
            color: #D8BFD8;
        }

        .pagination button.active {
            background: #D8BFD8;
            border-color: #D8BFD8;
            color: white;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 导航栏样式 */
        .nav-header {
            background: white;
            padding: 1rem 2rem;
            box-shadow: 0 2px 10px rgba(230, 230, 250, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            margin-bottom: 2rem;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            color: #D8BFD8;
        }

        .main-nav {
            display: flex;
            gap: 2rem;
        }

        .nav-link {
            color: #666;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
            padding: 0.5rem 0;
        }

        .nav-link:hover {
            color: #D8BFD8;
        }

        .nav-link.active {
            color: #D8BFD8;
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #D8BFD8, #E6E6FA);
            border-radius: 1px;
        }

        /* 响应式调整 */
        @media (max-width: 1024px) {
            .books-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .actions-bar {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
            }

            .search-filter-container {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                width: 100%;
            }

            .search-input {
                width: 100%;
            }

            .view-toggle {
                align-self: flex-start;
            }

            .books-list .book-card {
                flex-direction: column;
            }

            .books-list .book-cover {
                width: 100%;
                height: 200px;
            }

            .main-nav {
                display: none;
            }

            .nav-container {
                flex-direction: column;
                gap: 1rem;
            }

            .stats-cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .books-grid {
                grid-template-columns: 1fr;
            }

            .stats-cards {
                grid-template-columns: 1fr;
            }

            .book-meta {
                flex-direction: column;
                gap: 0.5rem;
            }
        }

        /* 动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }

        /* 模态框样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <header class="nav-header">
        <div class="nav-container">
            <a href="/" class="logo">
                <span class="logo-icon">📚</span>
                <span>智慧图书馆</span>
            </a>
            <nav class="main-nav">
                <a href="/" class="nav-link">首页</a>
                <a href="/dashboard" class="nav-link">仪表盘</a>
                <a href="/reader" class="nav-link">读者管理</a>
                <a href="/book" class="nav-link active">图书管理</a>
                <a href="/borrow" class="nav-link">借阅服务</a>
                <a href="/admin" class="nav-link">系统管理</a>
                <a href="/stats" class="nav-link">数据分析</a>
            </nav>
        </div>
    </header>

    <main class="container" style="max-width: 1400px;">
        <section class="page-header fade-in">
            <div class="page-title">
                <h1>图书管理</h1>
                <p>管理图书馆藏书，监控库存状态，维护图书信息</p>
            </div>
        </section>

        <section class="stats-cards fade-in">
            <div class="stat-card">
                <div class="stat-icon">📚</div>
                <div class="stat-value" id="totalBooks">0</div>
                <p class="stat-label">总藏书量</p>
            </div>

            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value" id="availableBooks">0</div>
                <p class="stat-label">可借图书</p>
            </div>

            <div class="stat-card">
                <div class="stat-icon">📖</div>
                <div class="stat-value" id="borrowedBooks">0</div>
                <p class="stat-label">在借图书</p>
            </div>

            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <div class="stat-value" id="newBooks">0</div>
                <p class="stat-label">本月新增</p>
            </div>
        </section>

        <section class="actions-bar fade-in">
            <div class="search-filter-container">
                <div class="search-box">
                    <input type="text" class="search-input" placeholder="搜索图书标题、作者、ISBN...">
                    <button class="btn btn-primary" onclick="searchBooks()">搜索</button>
                </div>

                <select class="filter-select" id="categoryFilter">
                    <option value="">所有类别</option>
                    <option value="computer">计算机</option>
                    <option value="literature">文学</option>
                    <option value="economy">经济管理</option>
                    <option value="engineering">工程技术</option>
                    <option value="science">自然科学</option>
                    <option value="social">社会科学</option>
                </select>

                <select class="filter-select" id="statusFilter">
                    <option value="">所有状态</option>
                    <option value="available">可借阅</option>
                    <option value="borrowed">已借出</option>
                    <option value="reserved">已预约</option>
                </select>

                <div class="view-toggle">
                    <button class="view-btn active" data-view="grid" onclick="changeView('grid')">
                        <span>🧱</span> 网格
                    </button>
                    <button class="view-btn" data-view="list" onclick="changeView('list')">
                        <span>📋</span> 列表
                    </button>
                </div>
            </div>

            <button class="btn btn-primary" onclick="openNewBookModal()">
                + 添加新书
            </button>
        </section>

        <section class="books-container fade-in">
            <div id="booksGrid" class="books-grid">
                <!-- 图书卡片将通过JavaScript动态加载 -->
                <div class="book-card">
                    <div class="book-cover">
                        <span>📚</span>
                    </div>
                    <div class="book-info">
                        <h3 class="book-title">Python编程从入门到实践</h3>
                        <p class="book-author">作者: Eric Matthes</p>
                        <div class="book-meta">
                            <div class="meta-item">
                                <div class="meta-label">ISBN</div>
                                <div class="meta-value">9787115428028</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-label">类别</div>
                                <div class="meta-value">计算机</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-label">库存</div>
                                <div class="meta-value">5/8</div>
                            </div>
                        </div>
                        <div class="status-badge status-available">可借阅</div>
                        <div class="book-actions">
                            <button class="action-btn primary" onclick="borrowBook('B20230001')">借阅</button>
                            <button class="action-btn" onclick="viewBook('B20230001')">详情</button>
                            <button class="action-btn" onclick="editBook('B20230001')">编辑</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 列表视图容器 -->
            <div id="booksList" class="books-list" style="display: none;">
                <!-- 列表视图内容将通过JavaScript动态加载 -->
            </div>

            <!-- 表格视图容器（备用） -->
            <div id="booksTable" class="books-table">
                <div class="table-header">
                    <div>图书ID</div>
                    <div>书名</div>
                    <div>作者</div>
                    <div>ISBN</div>
                    <div>类别</div>
                    <div>库存</div>
                    <div>操作</div>
                </div>
                <div id="booksTableBody">
                    <!-- 表格行将通过JavaScript动态加载 -->
                </div>
            </div>
        </section>

        <div class="pagination fade-in">
            <button onclick="changePage(-1)" disabled id="prevPage">上一页</button>
            <div>
                <span id="currentPage">1</span> / <span id="totalPages">1</span>
            </div>
            <button onclick="changePage(1)" id="nextPage">下一页</button>
        </div>

        <!-- 添加新书模态框 -->
        <div id="newBookModal" class="modal-overlay">
            <div class="modal-content">
                <h2 style="margin-top: 0;">添加新书</h2>
                <form id="newBookForm">
                    <div style="display: grid; gap: 1rem;">
                        <input type="text" placeholder="图书标题" required style="padding: 0.8rem; border: 2px solid #E6E6FA; border-radius: 8px;">
                        <input type="text" placeholder="作者" required style="padding: 0.8rem; border: 2px solid #E6E6FA; border-radius: 8px;">
                        <input type="text" placeholder="ISBN" required style="padding: 0.8rem; border: 2px solid #E6E6FA; border-radius: 8px;">
                        <select style="padding: 0.8rem; border: 2px solid #E6E6FA; border-radius: 8px;">
                            <option value="">选择类别</option>
                            <option value="computer">计算机</option>
                            <option value="literature">文学</option>
                            <option value="economy">经济管理</option>
                        </select>
                        <input type="number" placeholder="库存数量" min="1" required style="padding: 0.8rem; border: 2px solid #E6E6FA; border-radius: 8px;">
                    </div>
                    <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                        <button type="button" class="btn-secondary" style="flex: 1;" onclick="closeNewBookModal()">取消</button>
                        <button type="submit" class="btn-primary" style="flex: 1;">添加图书</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="/static/js/book.js"></script>
</body>
</html>
