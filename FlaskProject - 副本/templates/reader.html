<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>读者管理 - 智慧图书馆管理系统</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <style>
        /* 读者管理页面特定样式 */
        .page-header {
            background: linear-gradient(135deg, #FFFFFF 0%, #F8F8FF 100%);
            padding: 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(230, 230, 250, 0.2);
        }

        .page-title h1 {
            font-size: 2.2rem;
            color: #333;
            margin: 0 0 0.5rem;
            background: linear-gradient(135deg, #D8BFD8 0%, #E6E6FA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-title p {
            color: #666;
            margin: 0;
        }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 10px rgba(230, 230, 250, 0.1);
        }

        .search-box {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .search-input {
            padding: 0.8rem 1.5rem;
            border: 2px solid #E6E6FA;
            border-radius: 8px;
            width: 300px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #D8BFD8;
            box-shadow: 0 0 0 3px rgba(216, 191, 216, 0.1);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #D8BFD8 0%, #E6E6FA 100%);
            color: white;
        }

        .btn-secondary {
            background: #F8F8FF;
            color: #666;
            border: 2px solid #E6E6FA;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(216, 191, 216, 0.3);
        }

        .btn-secondary:hover {
            border-color: #D8BFD8;
            color: #D8BFD8;
        }

        .readers-table-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(230, 230, 250, 0.2);
            margin-bottom: 2rem;
        }

        .table-header {
            display: grid;
            grid-template-columns: 1fr 2fr 2fr 2fr 1fr 1fr 1fr 1fr;
            padding: 1rem 1.5rem;
            background: #F8F8FF;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #E6E6FA;
        }

        .table-row {
            display: grid;
            grid-template-columns: 1fr 2fr 2fr 2fr 1fr 1fr 1fr 1fr;
            padding: 1rem 1.5rem;
            align-items: center;
            border-bottom: 1px solid #F0F0F0;
            transition: background 0.2s ease;
        }

        .table-row:hover {
            background: #F8F8FF;
        }

        .table-row:last-child {
            border-bottom: none;
        }

        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-active {
            background: rgba(72, 187, 120, 0.1);
            color: #48BB78;
        }

        .status-overdue {
            background: rgba(245, 101, 101, 0.1);
            color: #F56565;
        }

        .status-inactive {
            background: rgba(160, 174, 192, 0.1);
            color: #A0AEC0;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            padding: 0.4rem 0.8rem;
            border: 1px solid #E6E6FA;
            background: white;
            border-radius: 6px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .action-btn:hover {
            border-color: #D8BFD8;
            color: #D8BFD8;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .pagination button {
            padding: 0.6rem 1.2rem;
            border: 1px solid #E6E6FA;
            background: white;
            border-radius: 6px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .pagination button:hover {
            border-color: #D8BFD8;
            color: #D8BFD8;
        }

        .pagination button.active {
            background: #D8BFD8;
            border-color: #D8BFD8;
            color: white;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(230, 230, 250, 0.2);
            text-align: center;
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #D8BFD8;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
            margin: 0.5rem 0;
        }

        .stat-label {
            color: #666;
            font-size: 0.95rem;
            margin: 0;
        }

        /* 导航栏样式 */
        .nav-header {
            background: white;
            padding: 1rem 2rem;
            box-shadow: 0 2px 10px rgba(230, 230, 250, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            margin-bottom: 2rem;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            color: #D8BFD8;
        }

        .main-nav {
            display: flex;
            gap: 2rem;
        }

        .nav-link {
            color: #666;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
            padding: 0.5rem 0;
        }

        .nav-link:hover {
            color: #D8BFD8;
        }

        .nav-link.active {
            color: #D8BFD8;
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #D8BFD8, #E6E6FA);
            border-radius: 1px;
        }

        /* 响应式调整 */
        @media (max-width: 1024px) {
            .table-header,
            .table-row {
                grid-template-columns: repeat(4, 1fr);
                gap: 1rem;
            }

            .table-header > :nth-child(n+5),
            .table-row > :nth-child(n+5) {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .actions-bar {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
            }

            .search-box {
                width: 100%;
            }

            .search-input {
                width: 100%;
            }

            .main-nav {
                display: none;
            }

            .nav-container {
                flex-direction: column;
                gap: 1rem;
            }

            .stats-cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .table-header,
            .table-row {
                grid-template-columns: repeat(2, 1fr);
            }

            .table-header > :nth-child(n+3),
            .table-row > :nth-child(n+3) {
                display: none;
            }

            .stats-cards {
                grid-template-columns: 1fr;
            }
        }

        /* 动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
    </style>
</head>
<body>
    <header class="nav-header">
        <div class="nav-container">
            <a href="/" class="logo">
                <span class="logo-icon">📚</span>
                <span>智慧图书馆</span>
            </a>
            <nav class="main-nav">
                <a href="/" class="nav-link">首页</a>
                <a href="/dashboard" class="nav-link">仪表盘</a>
                <a href="/reader" class="nav-link active">读者管理</a>
                <a href="/book" class="nav-link">图书管理</a>
                <a href="/borrow" class="nav-link">借阅服务</a>
                <a href="/admin" class="nav-link">系统管理</a>
                <a href="/stats" class="nav-link">数据分析</a>
            </nav>
        </div>
    </header>

    <main class="container" style="max-width: 1400px;">
        <section class="page-header fade-in">
            <div class="page-title">
                <h1>读者管理</h1>
                <p>管理读者信息，维护信用体系，监控读者行为</p>
            </div>
        </section>

        <section class="stats-cards fade-in">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="totalReaders">0</div>
                <p class="stat-label">注册读者</p>
            </div>

            <div class="stat-card">
                <div class="stat-icon">📖</div>
                <div class="stat-value" id="activeReaders">0</div>
                <p class="stat-label">活跃读者</p>
            </div>

            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <div class="stat-value" id="avgCreditScore">0</div>
                <p class="stat-label">平均信用分</p>
            </div>

            <div class="stat-card">
                <div class="stat-icon">⏰</div>
                <div class="stat-value" id="overdueReaders">0</div>
                <p class="stat-label">逾期读者</p>
            </div>
        </section>

        <section class="actions-bar fade-in">
            <div class="search-box">
                <input type="text" class="search-input" placeholder="搜索读者ID、姓名或邮箱...">
                <button class="btn btn-primary" onclick="searchReaders()">搜索</button>
            </div>
            <button class="btn btn-primary" onclick="openNewReaderModal()">
                + 添加新读者
            </button>
        </section>

        <section class="readers-table-container fade-in">
            <div class="table-header">
                <div>读者ID</div>
                <div>姓名</div>
                <div>联系方式</div>
                <div>信用分</div>
                <div>借阅额度</div>
                <div>当前借阅</div>
                <div>逾期次数</div>
                <div>操作</div>
            </div>

            <div id="readersTableBody">
                <!-- 读者数据将通过JavaScript动态加载 -->
                <div class="table-row">
                    <div>R20230001</div>
                    <div>张三</div>
                    <div>zhangsan@example.com</div>
                    <div><span class="status-badge status-active">95</span></div>
                    <div>5</div>
                    <div>2</div>
                    <div>0</div>
                    <div class="action-buttons">
                        <button class="action-btn" onclick="viewReader('R20230001')">查看</button>
                        <button class="action-btn" onclick="editReader('R20230001')">编辑</button>
                    </div>
                </div>
            </div>
        </section>

        <div class="pagination fade-in">
            <button onclick="changePage(-1)" disabled id="prevPage">上一页</button>
            <div>
                <span id="currentPage">1</span> / <span id="totalPages">1</span>
            </div>
            <button onclick="changePage(1)" id="nextPage">下一页</button>
        </div>
    </main>

    <script src="/static/js/reader.js"></script>
</body>
</html>
