<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运营仪表盘 - 智慧图书馆管理系统</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* 仪表盘特定样式 */
        .dashboard-header {
            background: linear-gradient(135deg, #FFFFFF 0%, #F8F8FF 100%);
            padding: 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(230, 230, 250, 0.2);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .dashboard-title h1 {
            font-size: 2.2rem;
            color: #333;
            margin: 0;
            background: linear-gradient(135deg, #D8BFD8 0%, #E6E6FA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-title p {
            color: #666;
            margin: 0.5rem 0 0;
        }

        .period-filter {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .period-filter label {
            font-weight: 500;
            color: #666;
        }

        .period-filter select {
            padding: 0.5rem 1rem;
            border: 2px solid #E6E6FA;
            border-radius: 8px;
            background: white;
            color: #333;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .period-filter select:focus {
            outline: none;
            border-color: #D8BFD8;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(230, 230, 250, 0.2);
            transition: transform 0.3s ease;
            border-left: 4px solid #D8BFD8;
        }

        .stat-card:hover {
            transform: translateY(-4px);
        }

        .stat-card:nth-child(2) {
            border-left-color: #E6E6FA;
        }

        .stat-card:nth-child(3) {
            border-left-color: #DDA0DD;
        }

        .stat-card:nth-child(4) {
            border-left-color: #9370DB;
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .stat-icon {
            font-size: 2rem;
            color: #D8BFD8;
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: bold;
            color: #333;
            margin: 0.5rem 0;
        }

        .stat-label {
            color: #666;
            font-size: 0.95rem;
            margin: 0;
        }

        .stat-change {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 0.5rem;
        }

        .stat-change.positive {
            background: rgba(72, 187, 120, 0.1);
            color: #48BB78;
        }

        .stat-change.negative {
            background: rgba(245, 101, 101, 0.1);
            color: #F56565;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(230, 230, 250, 0.2);
            transition: all 0.3s ease;
        }

        .chart-container:hover {
            box-shadow: 0 8px 30px rgba(216, 191, 216, 0.3);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .chart-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin: 0;
        }

        .chart-controls {
            display: flex;
            gap: 0.5rem;
        }

        .chart-controls button {
            padding: 0.4rem 0.8rem;
            border: 1px solid #E6E6FA;
            background: white;
            border-radius: 6px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .chart-controls button:hover {
            border-color: #D8BFD8;
            color: #D8BFD8;
        }

        .chart-controls button.active {
            background: #D8BFD8;
            border-color: #D8BFD8;
            color: white;
        }

        .chart {
            width: 100%;
            height: 400px;
        }

        .full-width-chart {
            grid-column: 1 / -1;
        }

        .full-width-chart .chart {
            height: 450px;
        }

        .recent-activities {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(230, 230, 250, 0.2);
        }

        .activities-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .activities-header h2 {
            font-size: 1.3rem;
            color: #333;
            margin: 0;
        }

        .activities-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .activity-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            background: #F8F8FF;
            border-radius: 8px;
            transition: background 0.2s ease;
        }

        .activity-item:hover {
            background: #F0F0FF;
        }

        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #E6E6FA 0%, #D8BFD8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1rem;
            color: white;
            font-size: 1.2rem;
        }

        .activity-content {
            flex: 1;
        }

        .activity-title {
            font-weight: 500;
            color: #333;
            margin: 0 0 0.3rem;
        }

        .activity-desc {
            color: #666;
            font-size: 0.9rem;
            margin: 0;
        }

        .activity-time {
            color: #999;
            font-size: 0.85rem;
            margin: 0.3rem 0 0;
        }

        .nav-header {
            background: white;
            padding: 1rem 2rem;
            box-shadow: 0 2px 10px rgba(230, 230, 250, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            margin-bottom: 2rem;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            color: #D8BFD8;
        }

        .main-nav {
            display: flex;
            gap: 2rem;
        }

        .nav-link {
            color: #666;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
            padding: 0.5rem 0;
        }

        .nav-link:hover {
            color: #D8BFD8;
        }

        .nav-link.active {
            color: #D8BFD8;
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #D8BFD8, #E6E6FA);
            border-radius: 1px;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }

            .chart-container {
                min-width: 100%;
            }

            .stats-cards {
                grid-template-columns: repeat(2, 1fr);
            }

            .main-nav {
                display: none;
            }

            .header-top {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .stats-cards {
                grid-template-columns: 1fr;
            }
        }

        /* 动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-up {
            animation: fadeInUp 0.6s ease-out;
        }
    </style>
</head>
<body>
    <header class="nav-header">
        <div class="nav-container">
            <a href="/" class="logo">
                <span class="logo-icon">📚</span>
                <span>智慧图书馆</span>
            </a>
            <nav class="main-nav">
                <a href="/" class="nav-link">首页</a>
                <a href="/dashboard" class="nav-link active">仪表盘</a>
                <a href="/reader" class="nav-link">读者管理</a>
                <a href="/book" class="nav-link">图书管理</a>
                <a href="/borrow" class="nav-link">借阅服务</a>
                <a href="/admin" class="nav-link">系统管理</a>
                <a href="/stats" class="nav-link">数据分析</a>
            </nav>
        </div>
    </header>

    <main class="container" style="max-width: 1400px;">
        <section class="dashboard-header fade-in-up">
            <div class="header-top">
                <div class="dashboard-title">
                    <h1>运营指挥中心</h1>
                    <p>实时监控图书馆运营数据，洞察读者行为趋势</p>
                </div>
                <div class="period-filter">
                    <label for="period">数据周期:</label>
                    <select id="period">
                        <option value="day">今日</option>
                        <option value="week" selected>本周</option>
                        <option value="month">本月</option>
                        <option value="year">本年</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="stats-cards fade-in-up">
            <div class="stat-card">
                <div class="stat-header">
                    <div>
                        <p class="stat-label">今日借阅</p>
                        <div class="stat-value" id="todayBorrows">0</div>
                    </div>
                    <div class="stat-icon">📖</div>
                </div>
                <div class="stat-change positive" id="borrowChange">+0%</div>
            </div>

            <div class="stat-card">
                <div class="stat-header">
                    <div>
                        <p class="stat-label">在线读者</p>
                        <div class="stat-value" id="activeReaders">0</div>
                    </div>
                    <div class="stat-icon">👥</div>
                </div>
                <div class="stat-change positive" id="readerChange">+0%</div>
            </div>

            <div class="stat-card">
                <div class="stat-header">
                    <div>
                        <p class="stat-label">在借图书</p>
                        <div class="stat-value" id="borrowedBooks">0</div>
                    </div>
                    <div class="stat-icon">📚</div>
                </div>
                <div class="stat-label" id="availableBooks">可用: 0 本</div>
            </div>

            <div class="stat-card">
                <div class="stat-header">
                    <div>
                        <p class="stat-label">逾期图书</p>
                        <div class="stat-value" id="overdueBooks">0</div>
                    </div>
                    <div class="stat-icon">⏰</div>
                </div>
                <div class="stat-change negative" id="overdueChange">+0%</div>
            </div>
        </section>

        <section class="charts-grid fade-in-up">
            <div class="chart-container">
                <div class="chart-header">
                    <h2 class="chart-title">借阅趋势分析</h2>
                    <div class="chart-controls">
                        <button class="active" data-chart="borrowTrend">趋势</button>
                        <button data-chart="categoryTrend">分类</button>
                    </div>
                </div>
                <div class="chart" id="borrowTrendChart"></div>
            </div>

            <div class="chart-container">
                <div class="chart-header">
                    <h2 class="chart-title">图书类别分布</h2>
                    <div class="chart-controls">
                        <button class="active" data-chart="categoryPie">饼图</button>
                        <button data-chart="categoryBar">柱状图</button>
                    </div>
                </div>
                <div class="chart" id="categoryChart"></div>
            </div>

            <div class="chart-container full-width-chart">
                <div class="chart-header">
                    <h2 class="chart-title">读者活跃度分析</h2>
                    <div class="chart-controls">
                        <button class="active" data-chart="hourly">24小时分布</button>
                        <button data-chart="credit">信用分布</button>
                        <button data-chart="activity">借阅分组</button>
                    </div>
                </div>
                <div class="chart" id="activityChart"></div>
            </div>
        </section>

        <section class="recent-activities fade-in-up">
            <div class="activities-header">
                <h2>近期活动</h2>
                <button style="background: #F8F8FF; border: 1px solid #E6E6FA; padding: 0.5rem 1rem; border-radius: 6px; color: #666; cursor: pointer;">
                    查看更多
                </button>
            </div>
            <div class="activities-list" id="activitiesList">
                <!-- 活动项将通过JavaScript动态加载 -->
                <div class="activity-item">
                    <div class="activity-icon">📖</div>
                    <div class="activity-content">
                        <h3 class="activity-title">系统初始化</h3>
                        <p class="activity-desc">图书馆管理系统已启动</p>
                        <p class="activity-time">刚刚</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
